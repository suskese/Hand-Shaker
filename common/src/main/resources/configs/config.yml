# HandShaker Configuration File

settings:
  config-version: 7
  debug: false
  handshaker-enforcement: true
  bedrock-policy: false
  timeout-seconds: 5
  whitelist-enforcement: false
  mod-versioning: true
  modpack-hashes: []
  database: false
  use-hash-for-mods: true
  runtime-cache: false
  handshaker-version-compatibility:
    modern-7.0+: true
    hybrid-6.0: false
    legacy-3.0+: false
    unsigned: false  
  custom-lists:
    mods-required-enabled: true
    mods-blacklisted-enabled: true
    mods-whitelisted-enabled: true
  default-action: kick
advanced-experimental:
  rate-limit-per-minute: 10
  enable-diagnostic-command: true
  payload:
    compression-enabled: true
  database:
    async-operations: true
    pool-size: 15
    idle-timeout-ms: 300000
    max-lifetime-ms: 1800000
    delete-history-days: 30
  api:
    enable-rest-api: false
    rest-api-port: 8080
    # api-key: ""  # Set a non-empty value to require X-Api-Key header authentication